<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>shadowkit</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
        font-size: 12px;
      }
      body {
        margin: 0;
        background: Canvas;
        color: CanvasText;
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100vh;
      }
      header {
        padding: 8px 12px;
        border-bottom: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
        display: flex;
        gap: 12px;
        align-items: center;
      }
      header h1 {
        font-size: 12px;
        font-weight: 600;
        margin: 0;
      }
      header .meta {
        opacity: 0.6;
      }
      button {
        font: inherit;
        padding: 2px 8px;
      }
      main {
        overflow: auto;
        padding: 8px 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .row {
        display: grid;
        grid-template-columns: 80px 1fr 1fr;
        gap: 8px;
        padding: 4px 0;
        border-bottom: 1px dashed
          color-mix(in srgb, CanvasText 8%, transparent);
      }
      .row .kind {
        text-transform: uppercase;
        opacity: 0.7;
      }
      .row pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .empty {
        opacity: 0.6;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>shadowkit</h1>
      <span class="meta" id="meta">waiting for messages…</span>
      <button id="clear">clear</button>
    </header>
    <main id="log">
      <div class="empty">no messages yet — emit one with the bridge.</div>
    </main>
    <script src="panel.js" type="module"></script>
  </body>
</html>
